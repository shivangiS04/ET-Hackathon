version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ev_user:ev_password@postgres:5432/ev_fleet_db
      - MONGODB_URL=mongodb://mongo:27017
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - neo4j
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ev-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
    command: npm run dev
    networks:
      - ev-network

  # MongoDB - Data Storage
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
    networks:
      - ev-network

  # Neo4j - Graph Database for Supply Chain
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - ev-network

  # Redis - Caching & Real-time Updates
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ev-network

  # PostgreSQL - Primary Database for Production
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ev_user
      - POSTGRES_PASSWORD=ev_password
      - POSTGRES_DB=ev_fleet_db
      - POSTGRES_INITDB_ARGS=-c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user -d ev_fleet_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-network

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  redis_data:

networks:
  ev-network:
    driver: bridge
