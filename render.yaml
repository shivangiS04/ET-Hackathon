# Render Blueprint Configuration
# This file defines the deployment configuration for both services

services:
  # Backend Service
  - type: web
    name: ev-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production

  # Frontend Service
  - type: web
    name: ev-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NEXT_PUBLIC_API_URL
        value: https://ev-backend.onrender.com/api/v1
